<!DOCTYPE html>
{%- set _user_theme = (frappe.db.get_value("User", frappe.session.user, "desk_theme") or "Light").lower() -%}
{%- set ws = frappe.get_doc("Website Settings") -%}
<html lang="en" data-theme-mode="{{ _user_theme }}" data-theme="{{ _user_theme }}">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>RNS Prime</title>
  <script type="module" crossorigin src="/assets/pos_prime/frontend/assets/index-Cze5d72D.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/pos_prime/frontend/assets/index-nkqt7mOx.css">
  <script>window.csrf_token = "{{ frappe.session.csrf_token }}";</script>
  <script>
    (function() {
      var m = document.documentElement.getAttribute("data-theme-mode");
      if (m === "automatic") {
        var q = window.matchMedia("(prefers-color-scheme: dark)");
        document.documentElement.setAttribute("data-theme", q.matches ? "dark" : "light");
        q.addEventListener("change", function(e) {
          document.documentElement.setAttribute("data-theme", e.matches ? "dark" : "light");
        });
      }
    })();
  </script>
  </head>

<body>
  <div id="splash-screen" class="app-loader">
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      .app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        font-family: system-ui, -apple-system, sans-serif;
      }

      .logo-container {
        width: 88px;
        height: 88px;
        border-radius: 22px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #fff;
        margin-bottom: 24px;
        border: 1px solid #f3f4f6;
      }

      .brand-name {
        color: #111827;
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 4px;
        letter-spacing: -0.5px;
      }

      .brand-tagline {
        color: #6b7280;
        font-size: 15px;
        margin-bottom: 40px;
      }

      .loader-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 240px;
      }

      .loading-bar-container {
        width: 100%;
        height: 4px;
        background-color: #f3f4f6;
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 12px;
        position: relative;
      }

      .loading-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        background-color: #007bff;
        border-radius: 4px;
        animation: loadBar 1.5s infinite ease-in-out;
      }

      @keyframes loadBar {
        0% { left: -40%; }
        100% { left: 100%; }
      }

      .loading-text {
        color: #9ca3af;
        font-size: 13px;
        font-weight: 500;
        transition: opacity 0.2s;
      }
    </style>
    <div class="logo-container">
      <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#007bff"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7" />
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" />
        <path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4" />
        <path d="M2 7h20" />
        <path
          d="M22 7v3a2 2 0 0 1-2 2v0a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12v0a2 2 0 0 1-2-2V7" />
      </svg>
    </div>
    <div class="brand-name">RNS Prime</div>
    <div class="brand-tagline">Logic that empowers businesses.</div>

    <div class="loader-section">
      <div class="loading-bar-container">
        <div class="loading-bar"></div>
      </div>
      <div class="loading-text" id="splash-text">Initializing Application...</div>
    </div>
    <script>
      (function () {
        var texts = ['Initializing Application...', 'Loading Data...', 'Processing...', 'Setting up workspace...'];
        var idx = 0;
        setInterval(function () {
          idx = (idx + 1) % texts.length;
          var el = document.getElementById('splash-text');
          if (el) el.innerText = texts[idx];
        }, 1500);
      })();
    </script>
  </div>
  <script>
    (function() {
      var p = window.location.pathname.replace(/\/$/, "");
      var standalone = ["/pos-prime/display", "/pos-prime/kiosk", "/pos-prime/customers"];
      var isStandalone = standalone.some(function(s) { return p.startsWith(s); });
      if (!isStandalone && p.startsWith("/pos-prime")) {
        window.location.replace("{{ desk_prefix }}/pos-terminal");
        return;
      }
    })();
  </script>
  <div id="app"></div>
</body>

</html>
